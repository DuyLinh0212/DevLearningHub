<div class="dashboard-container"> <app-sidebar></app-sidebar>

  <main class="main-content">
    <header class="content-header">
      <div class="top-breadcrumb" style="margin-left: 0;">
        <span>Cài đặt</span> <i class="bi bi-chevron-right" style="font-size: 0.7rem; margin: 0 4px;"></i> <span>Hồ sơ cá nhân</span>
      </div>
    </header>

    <div class="dashboard-scroll-body">
      <div class="settings-header">
        <h2>Cài đặt hệ thống</h2>
        <p>Quản lý thiết lập tài khoản và cấu hình các tùy chọn hệ thống</p>
      </div>

      <div class="settings-tabs">
        <button type="button" class="tab-btn active">Hồ sơ</button>
        <button type="button" class="tab-btn">Bảo mật</button>
        <button type="button" class="tab-btn">Thông báo</button>
        <button type="button" class="tab-btn">Giao diện</button>
        <button type="button" class="tab-btn">Riêng tư</button>
        <button type="button" class="tab-btn">Gói dịch vụ</button>
      </div>

      <div class="settings-card">
        <div class="card-header">
          <h3>Thông tin cá nhân</h3>
          <p>Cập nhật thông tin tài khoản và tiểu sử công khai của bạn trên diễn đàn</p>
        </div>

        <div class="profile-layout">
          <div class="avatar-column">
            <div class="avatar-circle-wrapper">
              <img [src]="avatarUrl" alt="Avatar" class="profile-avatar">
            </div>
            <button type="button" class="btn-action-avatar" (click)="changeAvatar()">
              <i class="bi bi-box-arrow-up"></i> Đổi ảnh
            </button>
          </div>

          <form (ngSubmit)="saveChanges()" #settingsForm="ngForm" class="form-column">
            <div class="form-grid">
              <div class="form-group">
                <label>Tên</label>
                <input type="text" name="firstName" [(ngModel)]="firstName" required class="admin-input-field">
              </div>

              <div class="form-group">
                <label>Họ và tên đệm</label>
                <input type="text" name="lastName" [(ngModel)]="lastName" required class="admin-input-field">
              </div>

              <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" [(ngModel)]="email" disabled class="disabled-input">
              </div>

              <div class="form-group">
                <label>Vai trò</label>
                <input type="text" name="role" [(ngModel)]="role" disabled class="disabled-input">
              </div>
            </div>

            <div class="form-group" style="margin-top: 16px;">
              <label>Giới thiệu bản thân</label>
              <textarea name="bio" [(ngModel)]="bio" rows="4" class="admin-input-field" placeholder="Viết một vài dòng giới thiệu về bản thân cậu..."></textarea>
            </div>

            <div class="form-actions" style="margin-top: 24px;">
              <button type="submit" class="btn-submit-save" [disabled]="isSaving || !settingsForm.form.valid">
                <i class="bi bi-cloud-arrow-up-fill" style="margin-right: 4px;"></i>
                {{ isSaving ? 'ĐANG LƯU...' : 'LƯU THAY ĐỔI' }}
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="settings-footer" style="margin-top: 32px; margin-bottom: 40px;">
        <p><i class="bi bi-question-circle"></i> Bạn cần hỗ trợ thiết lập cấu hình tài khoản? <a href="#" style="color: var(--purple-main);">Liên hệ Trợ giúp</a></p>
      </div>
    </div>
  </main>
</div>
