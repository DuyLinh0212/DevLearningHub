<div class="login-wrapper">
  <div class="left-panel">
    <div class="grid-overlay"></div>
    <h1 class="logo-text"><a routerLink="/landing">Dev-Learning Hub</a></h1>
  </div>

  <div class="right-panel">
    <div class="form-container">
      <h2>Chào mừng bạn quay trở lại</h2>
      <p class="subtitle">Nhập thông tin tài khoản của bạn để tiếp tục</p>

      <div class="social-login">
        <button class="btn-google">
          <img src="assets/icons/google.svg" alt="Google" width="18">
          Google
        </button>
        <button class="btn-facebook">
          <img src="assets/icons/facebook.svg" alt="Facebook" width="18">
          Facebook
        </button>
      </div>

      <div class="divider">OR</div>

      <form (ngSubmit)="onLogin()">
  <div class="form-group">
    <label for="username">Tên đăng nhập</label>
    <div class="input-wrapper">
      <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
      <input id="username" type="text" [(ngModel)]="username" name="username" placeholder="John Doe">
    </div>
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <div class="input-wrapper">
      <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" /></svg>
      <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="name@example.com">
    </div>
  </div>

  <div class="form-group">
    <label for="password">Mật khẩu</label>
    <div class="input-wrapper">
      <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>
      <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="***********">
    </div>
  </div>

  <button type="submit" class="btn-submit" [disabled]="isLoading">
    {{ isLoading ? 'ĐANG XỬ LÝ...' : 'ĐĂNG NHẬP' }}
  </button>
</form>

      <p class="footer-text">Chưa có tài khoản? <a routerLink="/register">Đăng ký ngay</a></p>
    </div>
  </div>
</div>
