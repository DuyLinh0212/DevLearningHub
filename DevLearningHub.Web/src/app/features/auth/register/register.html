<div class="login-wrapper">
  <div class="left-panel">
    <div class="grid-overlay"></div>
    <h1 class="logo-text">Dev-Learning Hub</h1>
  </div>

  <div class="right-panel">
    <div class="form-container">
      <h2>Tạo tài khoản mới</h2>

      <div class="social-login">
        <button class="btn-google">
          <img src="/assets/icons/google.svg" alt="Google" width="18">
          Google
        </button>
        <button class="btn-facebook">
          <img src="/assets/icons/facebook.svg" alt="Facebook" width="18">
          Facebook
        </button>
      </div>

      <div class="divider">OR</div>

      <form>
        <div class="form-row">
          <div class="form-group flex-1">
            <label>Họ và Tên</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
              <input type="text" placeholder="John Doe">
            </div>
          </div>

          <div class="form-group flex-1">
            <label>Tên tài khoản</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
              <input type="text" placeholder="John Doe">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" /></svg>
            <input type="email" placeholder="name @example.com">
          </div>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>
            <input type="password" placeholder="***********">
          </div>
        </div>

        <button type="submit" class="btn-submit">ĐĂNG KÍ</button>
      </form>

      <p class="footer-text">Đã có tài khoản? <a routerLink="/login">Đăng nhập</a></p>
    </div>
  </div>
</div>
