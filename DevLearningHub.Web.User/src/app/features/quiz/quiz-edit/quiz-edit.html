<div class="edit-quiz-container" *ngIf="isCreator">
  <div class="edit-header">
    <h2>Chỉnh sửa bộ đề</h2>
    <p>Cập nhật thông tin chi tiết cho bộ đề của bạn</p>
  </div>

  <div class="edit-card">
    <form (ngSubmit)="saveQuiz()" #editForm="ngForm">
      <div class="form-group">
        <label>Tên bộ đề</label>
        <input type="text" name="title" [(ngModel)]="quizData.title" required>
      </div>

      <div class="form-group">
        <label>Mô tả bộ đề</label>
        <textarea name="description" [(ngModel)]="quizData.description" rows="3"></textarea>
      </div>

      <div class="copy-option-card">
        <div class="copy-option-text">
          <h4>Quyền sao chép bộ đề</h4>
          <p>Tắt tùy chọn này nếu bạn không muốn người khác copy bộ đề của mình.</p>
        </div>
        <label class="copy-switch">
          <input type="checkbox" name="allowedCopy" [(ngModel)]="quizData.allowedCopy">
          <span class="copy-switch-slider"></span>
        </label>
      </div>

      <div class="copy-option-card">
        <div class="copy-option-text">
          <h4>Hiển thị công khai</h4>
          <p>Tắt tùy chọn này nếu bạn muốn giữ bộ đề này ở chế độ riêng tư.</p>
        </div>
        <label class="copy-switch">
          <input type="checkbox" name="isPublic" [(ngModel)]="quizData.isPublic">
          <span class="copy-switch-slider"></span>
        </label>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Số lượng câu hỏi</label>
          <input type="number" name="totalQuestions" [(ngModel)]="quizData.totalQuestions" required>
        </div>

        <div class="form-group">
          <label>Mức độ (Level)</label>
          <select name="level" [(ngModel)]="quizData.level" required>
            <option value="beginner">Beginner (Dễ)</option>
            <option value="intermediate">Intermediate (Trung bình)</option>
            <option value="advanced">Advanced (Khó)</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-save" [disabled]="isSaving || !editForm.form.valid">
          {{ isSaving ? 'ĐANG LƯU...' : 'LƯU THAY ĐỔI' }}
        </button>
      </div>
    </form>
  </div>
</div>
