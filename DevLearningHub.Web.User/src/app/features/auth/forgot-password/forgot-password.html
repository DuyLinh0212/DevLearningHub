<div class="login-wrapper">
  <div class="login-bg">
    <div class="login-bg-img"></div>
    <div class="login-bg-glow glow-1"></div>
    <div class="login-bg-glow glow-2"></div>
  </div>

  <div class="auth-card">
    <div class="auth-card-inner">
      <div class="auth-brand">
        <img src="assets/images/logo2.png" alt="DevLearningHub Logo" class="auth-brand-logo" />
        <p>Nền tảng học lập trình thông minh</p>
      </div>

      <h2>Quên mật khẩu</h2>
      <p class="auth-subtitle">Nhập email đăng ký để nhận link đặt lại mật khẩu</p>

      @if (successMessage) {
        <div class="success-message">
          <i class="bi bi-check-circle-fill" style="margin-right:6px"></i>{{ successMessage }}
        </div>
      }

      @if (errorMessage) {
        <p class="error-message">{{ errorMessage }}</p>
      }

      @if (!successMessage) {
        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label>Địa chỉ Email</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
              </svg>
              <input type="email" placeholder="your@email.com" [(ngModel)]="email" name="email">
            </div>
          </div>

          <button type="submit" class="btn-submit" [disabled]="isLoading">
            {{ isLoading ? 'Đang gửi...' : 'GỬI LINK ĐẶT LẠI' }}
          </button>
        </form>
      }

      <p class="footer-text"><a routerLink="/login">← Quay lại đăng nhập</a></p>
    </div>
  </div>
</div>
