<div class="login-wrapper">
  <div class="login-bg">
    <div class="login-bg-img"></div>
    <div class="login-bg-glow glow-1"></div>
    <div class="login-bg-glow glow-2"></div>
  </div>

  <div class="auth-card">
    <div class="auth-card-inner">
      <div class="auth-brand">
        <img src="assets/images/logo2.png" alt="DevLearningHub Logo" class="auth-brand-logo" />
        <p>Nền tảng học lập trình thông minh</p>
      </div>

      <h2>Đặt lại mật khẩu</h2>
      <p class="auth-subtitle">Nhập mật khẩu mới cho tài khoản của bạn</p>

      @if (successMessage) {
        <div class="success-message">
          <i class="bi bi-check-circle-fill" style="margin-right:6px"></i>{{ successMessage }}
          <p style="margin:6px 0 0;font-size:0.8rem;opacity:0.8">Đang chuyển về trang đăng nhập...</p>
        </div>
      }

      @if (errorMessage) {
        <p class="error-message">{{ errorMessage }}</p>
      }

      @if (!successMessage && token) {
        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label>Mật khẩu mới</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input [type]="showPassword ? 'text' : 'password'" placeholder="Tối thiểu 6 ký tự" [(ngModel)]="newPassword" name="newPassword">
              <button type="button" class="pw-toggle" (click)="showPassword = !showPassword">
                <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'" style="font-size:1.1rem"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label>Xác nhận mật khẩu</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input [type]="showConfirm ? 'text' : 'password'" placeholder="Nhập lại mật khẩu" [(ngModel)]="confirmPassword" name="confirmPassword">
              <button type="button" class="pw-toggle" (click)="showConfirm = !showConfirm">
                <i [class]="showConfirm ? 'bi bi-eye-slash' : 'bi bi-eye'" style="font-size:1.1rem"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-submit" [disabled]="isLoading">
            {{ isLoading ? 'Đang xử lý...' : 'ĐẶT LẠI MẬT KHẨU' }}
          </button>
        </form>
      }

      <p class="footer-text"><a routerLink="/login">← Quay lại đăng nhập</a></p>
    </div>
  </div>
</div>
