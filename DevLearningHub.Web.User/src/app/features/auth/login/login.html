<div class="login-wrapper">
  <div class="left-panel">
    <div class="grid-overlay"></div>
    <h1 class="logo-text"><a routerLink="/landing">Dev-Learning Hub</a></h1>
  </div>

  <div class="right-panel">
    <div class="form-container">
      <h2>Chào mừng bạn quay trở lại</h2>
      <p class="subtitle">Nhập thông tin tài khoản của bạn để tiếp tục</p>

      <div class="social-login">
        <button class="btn-google" type="button">
          <img src="assets/icons/google.svg" alt="Google" width="18">
          Google
        </button>
        <button class="btn-facebook" type="button">
          <img src="assets/icons/facebook.svg" alt="Facebook" width="18">
          Facebook
        </button>
      </div>

      <div class="divider">OR</div>

      @if (errorMessage) {
        <div class="error-feedback-banner" style="background-color: #fef2f2; color: #991b1b; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 0.85rem; border: 1px solid #fca5a5; display: flex; align-items: center; gap: 8px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <form (ngSubmit)="onLogin()">
        <div class="form-group">
          <label for="usernameOrEmail">Tên đăng nhập hoặc Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
            <input id="usernameOrEmail" type="text" [(ngModel)]="usernameOrEmail" name="usernameOrEmail" placeholder="Nhập tên tài khoản hoặc email của bạn..." [disabled]="isLoading">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>
            <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="***********" style="padding-right: 42px;" [disabled]="isLoading">
            <button type="button" (click)="togglePasswordVisibility()" style="position: absolute; right: 12px; background: none; border: none; cursor: pointer; color: #9ca3af; display: flex; align-items: center; padding: 0;">
              <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'" style="font-size: 1.2rem;"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" [disabled]="isLoading">
          {{ isLoading ? 'ĐANG XỬ LÝ...' : 'ĐĂNG NHẬP' }}
        </button>
      </form>

      <p class="footer-text">Chưa có tài khoản? <a routerLink="/register">Đăng ký ngay</a></p>
    </div>
  </div>
</div>
