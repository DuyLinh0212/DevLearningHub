<div class="login-wrapper">
  <!-- Background image -->
  <div class="login-bg">
    <div class="login-bg-img"></div>
    <div class="login-bg-glow glow-1"></div>
    <div class="login-bg-glow glow-2"></div>
  </div>

  <!-- Centered glass card -->
  <div class="auth-card">
    <div class="auth-card-inner">
      <!-- Brand -->
      <div class="auth-brand">
        <img src="assets/images/logo2.png" alt="DevLearningHub Logo" class="auth-brand-logo" />
        <p>Nền tảng học lập trình thông minh</p>
      </div>

      <h2>Đăng nhập</h2>
      <p class="auth-subtitle">Chào mừng trở lại! Đăng nhập để tiếp tục học tập</p>

      <!-- Social login -->
      <div class="social-login">
        <button type="button">
          <img src="assets/icons/google.svg" alt="Google" width="18"> Google
        </button>
        <button type="button">
          <img src="assets/icons/facebook.svg" alt="Facebook" width="18"> Facebook
        </button>
      </div>

      <div class="divider">OR</div>

      <!-- Error -->
      @if (errorMessage) {
        <p class="error-message">{{ errorMessage }}</p>
      }

      <!-- Login form -->
      <form (ngSubmit)="onLogin()">
        <div class="form-group">
          <label>Tên tài khoản hoặc Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" placeholder="username hoặc email" [(ngModel)]="usernameOrEmail" name="usernameOrEmail">
          </div>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" placeholder="***********" [(ngModel)]="password" name="password">
            <button type="button" class="pw-toggle" (click)="togglePasswordVisibility()" aria-label="Toggle password">
              <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'" style="font-size: 1.1rem;"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" [disabled]="isLoading">
          {{ isLoading ? 'Đang đăng nhập...' : 'ĐĂNG NHẬP' }}
        </button>
      </form>

      <p class="footer-text">Chưa có tài khoản? <a routerLink="/register">Đăng kí ngay</a></p>
    </div>
  </div>
</div>
