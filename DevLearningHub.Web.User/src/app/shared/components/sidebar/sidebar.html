<aside class="sidebar" [class.is-mobile-open]="isMobileOpen">
  <div class="sidebar-brand">
    <div class="brand-info">
      <img src="assets/images/logo.svg" alt="Logo Dev-Learning Hub" class="brand-logo-img">
      <h2>Dev-Learning Hub</h2>
    </div>
    <button class="btn-sidebar-close-mobile" (click)="toggleMobileSidebar()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <a routerLink="/settings" class="sidebar-profile">
    <img [src]="profile.avatarUrl || 'assets/images/default-avatar.svg'" alt="Avatar" class="sidebar-profile-avatar">
    <div class="sidebar-profile-info">
      <strong>{{ profile.displayName }}</strong>
      <span>{{ profile.email || 'Tài khoản học viên' }}</span>
      <small>{{ profile.xpPoints }} XP</small>
    </div>
  </a>

  <div class="sidebar-search">
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" placeholder="Tìm kiếm bộ đề..." (keyup.enter)="onSidebarSearch($event)">
    </div>
  </div>
  
  <nav class="sidebar-menu">
    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="menu-item">
      <i class="bi bi-grid-1x2"></i> Tổng quan
    </a>
    <a routerLink="/quiz-bank" routerLinkActive="active" class="menu-item"><i class="bi bi-collection"></i> Kho Bộ đề</a>
    <a routerLink="/roadmap" routerLinkActive="active" class="menu-item"><i class="bi bi-bezier2"></i> Lộ trình học</a>
    <a routerLink="/dashboard/progress" routerLinkActive="active" class="menu-item"><i class="bi bi-bar-chart-line-fill"></i> Phân tích năng lực</a>
    <a routerLink="/code" routerLinkActive="active" class="menu-item"><i class="bi bi-code-slash"></i> Code</a>
    <a routerLink="/forum" routerLinkActive="active" class="menu-item"><i class="bi bi-people"></i> Diễn đàn</a>
    <a routerLink="/leaderboard" routerLinkActive="active" class="menu-item"><i class="bi bi-star"></i> Bảng xếp hạng</a>
    <a routerLink="/notifications" routerLinkActive="active" class="menu-item"><i class="bi bi-bell"></i> Thông báo</a>
    
    <div class="menu-heading">HỆ THỐNG</div>
    <a routerLink="/settings" routerLinkActive="active" class="menu-item"><i class="bi bi-gear"></i> Cài đặt</a>
  </nav>
  
  <div class="sidebar-footer">
    <a (click)="logout()" class="menu-item logout">
      <i class="bi bi-box-arrow-left"></i> Đăng xuất
    </a>
  </div>
</aside>

@if (isMobileOpen) {
  <div class="sidebar-mobile-overlay" (click)="toggleMobileSidebar()"></div>
}
