<header class="content-header"><div class="top-breadcrumb"><span>Feedback riêng</span></div><div class="admin-header-actions"><select [(ngModel)]="filter" (change)="load()"><option value="">Tất cả</option><option value="open">Open</option><option value="in_progress">In progress</option><option value="resolved">Resolved</option><option value="closed">Closed</option></select></div></header>
<div class="dashboard-scroll-body feedback-admin-page"><div class="feedback-admin-list">@if(loading){<p>Đang tải...</p>}@else if(!items.length){<p>Không có yêu cầu.</p>}@else{@for(item of items;track item.id){<button class="feedback-admin-row" (click)="select(item)"><span><b>{{item.subject}}</b><small>{{item.authorUsername}} · {{item.createdAt | date:'dd/MM/yyyy HH:mm'}}</small></span><span class="status">{{item.status}}</span></button>}}</div></div>
@if(selected){<div class="feedback-modal" (click)="selected=null"><div class="feedback-dialog" (click)="$event.stopPropagation()"><h2>{{selected.subject}}</h2><p>{{selected.body}}</p><label>Trạng thái<select [(ngModel)]="status"><option value="open">Open</option><option value="in_progress">In progress</option><option value="resolved">Resolved</option><option value="closed">Closed</option></select></label><label>Phản hồi<textarea [(ngModel)]="response" rows="6"></textarea></label><div><button (click)="selected=null">Hủy</button><button class="primary" (click)="save()">Lưu và thông báo</button></div></div></div>}
