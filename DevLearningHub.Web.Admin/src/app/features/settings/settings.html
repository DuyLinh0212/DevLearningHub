<div class="dashboard-container">
  <app-sidebar></app-sidebar>

  <main class="main-content">
    <header class="content-header">
      <div class="top-breadcrumb" style="margin-left: 0;">
        <span>Cài đặt</span> <i class="bi bi-chevron-right" style="font-size: 0.7rem; margin: 0 4px;"></i> <span>Hồ sơ cá nhân</span>
      </div>
    </header>

    <div class="dashboard-scroll-body">
      <div class="settings-header">
        <h2>Cài đặt hệ thống</h2>
        <p>Quản lý thiết lập tài khoản và cấu hình các tùy chọn hiển thị</p>
      </div>

      <div class="settings-tabs">
        <button type="button" class="tab-btn active">Hồ sơ</button>
        <button type="button" class="tab-btn">Bảo mật</button>
        <button type="button" class="tab-btn">Thông báo</button>
        <button type="button" class="tab-btn">Giao diện</button>
        <button type="button" class="tab-btn">Riêng tư</button>
      </div>

      <div class="settings-card">
        <div class="card-header">
          <h3>Thông tin cá nhân</h3>
          <p>Cập nhật thông tin định danh và ảnh đại diện công khai của bạn trên hệ thống</p>
        </div>

        <div class="profile-layout">
          <div class="avatar-column">
            <div class="avatar-circle-wrapper">
              <img [src]="avatarUrl || 'assets/images/default-avatar.svg'" alt="Avatar" class="profile-avatar">
            </div>
            <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
            <button type="button" class="btn-action-avatar" (click)="fileInput.click()">
              <i class="bi bi-cloud-arrow-up"></i> Tải ảnh mới
            </button>
          </div>

          <form (ngSubmit)="saveChanges()" #settingsForm="ngForm" class="form-column">
            <div class="form-grid">
              <div class="form-group">
                <label>Tên học viên</label>
                <input type="text" name="firstName" [(ngModel)]="firstName" required class="admin-input-field" placeholder="Ví dụ: Ngọc">
              </div>

              <div class="form-group">
                <label>Họ và tên đệm</label>
                <input type="text" name="lastName" [(ngModel)]="lastName" required class="admin-input-field" placeholder="Ví dụ: Huỳnh Văn">
              </div>

              <div class="form-group">
                <label>Địa chỉ Email</label>
                <input type="email" name="email" [(ngModel)]="email" disabled class="disabled-input">
              </div>

              <div class="form-group">
                <label>Quyền hạn tài khoản</label>
                <input type="text" name="role" [(ngModel)]="role" disabled class="disabled-input">
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-submit-save" [disabled]="isSaving || !settingsForm.form.valid">
                <i class="bi bi-cloud-arrow-up-fill" style="margin-right: 4px;"></i>
                {{ isSaving ? 'ĐANG LƯU...' : 'LƯU THAY ĐỔI' }}
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="settings-footer">
        <p><i class="bi bi-question-circle"></i> Bạn cần hỗ trợ thiết lập cấu hình tài khoản? <a href="#">Liên hệ Trợ giúp</a></p>
      </div>
    </div>
  </main>
</div>
